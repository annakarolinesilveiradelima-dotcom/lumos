name: manual-backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files
        run: |
          echo "Current folder:"
          pwd
          echo ""
          echo "Root files:"
          ls -la || true
          echo ""
          echo "Backend files:"
          ls -la lumos-backend || true
          echo ""
          echo "Searching for backfill_teaser.py:"
          find . -name "backfill_teaser.py" -print || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt

      - name: Check syntax
        run: |
          SCRIPT_PATH=$(find . -name "backfill_teaser.py" | head -n 1)

          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERRO: backfill_teaser.py não encontrado."
            echo "Arquivos Python encontrados:"
            find . -name "*.py" -print
            exit 1
   *      fi

          echo "Script e*contrado em: $SCRIPT_PATH"
       *  python -m py_compile "$SCRIPT_PA*H"

      - name: Run backfill
   *    env:
          OUTPUT_DATA: ${* github.workspace }}/data.json
   *      HISTORY_DIR: ${{ github.work*pace }}/history
          GNEWS_AP*_KEY: ${{ secrets.GNEWS_API_KEY }}*        run: |
          SCRIPT_PA*H=$(find . -name "backfill_teaser.*y" | head -n 1)

          if [ -z "$SCRIPT_PATH" ]; then
           *echo "ERRO: backfill_teaser.py não*encontrado."
            exit 1
  *       fi

          echo "Rodando*script em: $SCRIPT_PATH"
         *SCRIPT_DIR=$(dirname "$SCRIPT_PATH*)
          SCRIPT_FILE=$(basename*"$SCRIPT_PATH")

          cd "$SC*IPT_DIR"
          python "$SCRIPT*FILE"

      - name: Commit result*
        run: |
          git conf*g user.name "github-actions[bot]"
*         git config user.email "41*98282+github-actions[bot]@users.no*eply.github.com"
          git add*data.json history/
          git d*ff --cached --quiet || git commit *m "manual backfill teaser weeks"
 *        git push
