name: lumos-backfill-teaser

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt

      - name: Run teaser backfill
        working-directory: lumos-backend
        env:
          OUTPUT_DATA: ../data.json
          HISTORY_DIR: ../history
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python backfill_teaser.py

      - name: Commit backfill data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          git diff --cached --quiet || git commit -m "backfill lumos teaser weeks"
          git push
