 Backspace
 name: lumos-backfill-teasername:_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug files
        run: |
          echo "Root files:"
          ls -la
          echo ""
          echo "Searching for backfill_teaser.py:"
          find . -name "backfill_teaser.py" -print
          echo ""
          echo "Backend files:"
          ls -la lumos-backend || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt

      - name: Check backfill script syntax
        run: |
          SCRIPT_PATH=$(find . -name "backfill_teaser.py" | head -n 1)

          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERRO: backfill_teaser.py não encontrado no repositório."
            echo "Arquivos encontrados:"
            find . -maxdepth 4 -type f
            exit 1
          fi

          echo "Script encontrado em: $SCRIPT_PATH"
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          SCRIPT_FILE=$(basename "$SCRIPT_PATH")

          cd "$SCRIPT_DIR"
          python -m py_compile "$SCRIPT_FILE"

      - name: Run teaser backfill
        env:
          OUTPUT_DATA: ${{ github.workspace }}/data.json
          HISTORY_DIR: ${{ github.workspace }}/history
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          SCRIPT_PATH=$(find . -name "backfill_teaser.py" | head -n 1)

          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERRO: backfill_teaser.py não encontrado no repositório."
            exit 1
          fi

          echo "Rodando script em: $SCRIPT_PATH"
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          SCRIPT_FILE=$(basename "$SCRIPT_PATH")

          cd "$SCRIPT_DIR"
          python "$SCRIPT_FILE"

      - name: Commit backfill data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          git diff --cached --quiet || git commit -m "backfill lumos teaser weeks"
          git push

on:
