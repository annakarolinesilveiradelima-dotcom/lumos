name: lumos-backfill-teaser

"on":
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug files
        run: |
          echo "Current folder:"
          pwd
          echo "Root files:"
          ls -la
          echo "Backend files:"
          ls -la lumos-backend
          echo "Backfill file:"
          ls -la lumos-backend/backfill_teaser.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt

      - name: Check backfill script syntax
        run: |
          python -m py_compile lumos-backend/backfill_teaser.py

      - name: Run teaser backfill
        env:
          OUTPUT_DATA: ${{ github.workspace }}/data.json
          HISTORY_DIR: ${{ github.workspace }}/history
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          cd lumos-backend
          python backfill_teaser.py

      - name: Commit backfill data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          git diff --cached --quiet || git commit -m "backfill lumos teaser weeks"
          git push
``
