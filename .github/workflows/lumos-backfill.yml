name: lumos-backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare files
        run: |
          echo "Root files:"
          ls -la
          echo ""
          echo "Backend before:"
          ls -la lumos-backend || true

          if [ -f "backfill_teaser.py" ]; then
            echo "Copying root backfill_teaser.py to lumos-backend..."
            cp backfill_teaser.py lumos-backend/backfill_teaser.py
          fi

          echo ""
          echo "Backend after:"
          ls -la lumos-backend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt
          pip install pytrends pandas

      - name: Check syntax
        run: |
          python -m py_compile lumos-backend/backfill_teaser.py

      - name: Run backfill
        env:
          OUTPUT_DATA: ${{ github.workspace }}/data.json
          HISTORY_DIR: ${{ github.workspace }}/history
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd lumos-backend
          python backfill_teaser.py

      - name: Show generated files
        run: |
          echo "Root files after backfill:"
          ls -la
          echo ""
          echo "History files:"
          ls -la history || true

          echo ""
          echo "YouTube debug preview:"
          if [ -f "youtube_debug.json" ]; then
            head -120 youtube_debug.json
          else
            echo "youtube_debug.json not found"
          fi

          echo ""
          echo "X debug preview:"
          if [ -f "x_debug.json" ]; then
            head -120 x_debug.json
          else
            echo "x_debug.json not found"
          fi

          echo ""
          echo "Google Trends debug preview:"
          if [ -f "trends_debug.json" ]; then
            head -120 trends_debug.json
          else
            echo "trends_debug.json not found"
          fi

      - name: Commit results
        run
