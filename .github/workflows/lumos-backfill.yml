name: lumos-backfill

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare files
        run: |
          ls -la
          ls -la lumos-backend || true
          cp backfill_teaser.py lumos-backend/backfill_teaser.py
          ls -la lumos-backend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt
          pip install pytrends pandas

      - name: Check syntax
        run: |
          python -m py_compile lumos-backend/backfill_teaser.py

      - name: Run backfill
        env:
          OUTPUT_DATA: ${{ github.workspace }}/data.json
          HISTORY_DIR: ${{ github.workspace }}/history
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd lumos-backend
          python backfill_teaser.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history/ youtube_debug.json x_debug.json trends_debug.json lumos-backend/backfill_teaser.py || true
          git diff --cached --quiet || git commit -m "update lumos backfill"
          git push
