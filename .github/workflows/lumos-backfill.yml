name: lumos-backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare backfill script
        run: |
          echo "Root files:"
          ls -la

          echo ""
          echo "Backend files before:"
          ls -la lumos-backend || true

          if [ -f "backfill_teaser.py" ]; then
            echo "Atualizando lumos-backend/backfill_teaser.py com versao da raiz..."
            cp backfill_teaser.py lumos-backend/backfill_teaser.py
          fi

          echo ""
          echo "Backend files after:"
          ls -la lumos-backend

          echo ""
          echo "Backfill script:"
          ls -la lumos-backend/backfill_teaser.py

          echo ""
          echo "Social modules:"
          ls -la lumos-backend/social_reddit.py || true
          ls -la lumos-backend/social_youtube.py || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile lumos-backend/backfill_teaser.py
          python -m py_compile lumos-backend/social_reddit.py || true
          python -m py_compile lumos-backend/social_youtube.py || true

      - name: Run backfill
        env:
          OUTPUT_DATA: ${{ github.workspace }}/data.json
          HISTORY_DIR: ${{ github.workspace }}/history
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cd lumos-backend
          python backfill_teaser.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history/ lumos-backend/backfill_teaser.py lumos-backend/social_reddit.py lumos-backend/social_youtube.py || true
          git diff --cached --quiet || git commit -m "backfill teaser weeks with youtube"
          git push
