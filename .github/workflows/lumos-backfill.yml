name: lumos-backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files
        run: |
          echo "Root:"
          ls -la
          echo ""
          echo "Backend:"
          ls -la lumos-backend
          echo ""
          echo "Backfill script:"
          ls -la lumos-backend/backfill_teaser.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lumos-backend/requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile lumos-backend/backfill_teaser.py

      - name: Run backfill
        env:
          OUTPUT_DATA: data.json
          HISTORY_DIR: history
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          cd lumos-backend
          OUTPUT_DATA=../data.json HISTORY_DIR=../history python backfill_teaser.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history/ || true
          git diff --cached --quiet || git commit -m "backfill teaser weeks"
          git push
