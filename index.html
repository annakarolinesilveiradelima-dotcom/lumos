<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumos — Fandom Intelligence</title>

  <style>
    :root {
      --bg: #070A12;
      --panel: #0E1424;
      --panel-2: #121A2B;
      --card: #121A2B;
      --line: rgba(255,255,255,0.09);
      --text: #F5F7FB;
      --muted: #9AA6BD;
      --soft: #D8DEEC;
      --gold: #E7A94B;
      --blue: #4BA3FF;
      --cyan: #4BD7D0;
      --green: #63D471;
      --red: #FF6B6B;
      --purple: #B38CFF;
      --white: #FFFFFF;
      --shadow: 0 18px 60px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(75,163,255,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(231,169,75,0.12), transparent 28%),
        linear-gradient(180deg, #070A12 0%, #0B1020 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--gold), #8A5CF6);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      font-weight: 900;
      color: #08101D;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      padding: 10px 14px;
      border-radius: 999px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(99,212,113,0.12);
    }

    .hero {
      background:
        linear-gradient(135deg, rgba(231,169,75,0.18), transparent 44%),
        linear-gradient(135deg, rgba(75,163,255,0.12), transparent 65%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 24px;
      margin-bottom: 22px;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 54px);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    .hero p {
      color: var(--soft);
      line-height: 1.55;
      margin: 16px 0 0;
      max-width: 780px;
    }

    .hero-meta {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
    }

    .pill span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .pill strong {
      display: block;
      font-size: 16px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .kpis {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .card {
      background: rgba(18,26,43,0.86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .card h3 {
      margin: 0 0 14px;
      font-size: 16px;
      letter-spacing: -0.01em;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 9px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 850;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .kpi-value small {
      color: var(--muted);
      font-size: 15px;
      margin-left: 4px;
      letter-spacing: 0;
    }

    .kpi-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .main-grid {
      grid-template-columns: 1.05fr 0.95fr;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .platform-list {
      display: grid;
      gap: 12px;
    }

    .platform-row {
      display: grid;
      grid-template-columns: 130px 1fr 70px;
      gap: 12px;
      align-items: center;
    }

    .platform-name {
      color: var(--soft);
      font-size: 13px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), var(--blue));
      width: 0%;
      transition: width 0.8s ease;
    }

    .platform-number {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .buzz-wrap {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 22px;
      align-items: center;
    }

    .gauge {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        conic-gradient(var(--gold) var(--buzzDeg), rgba(255,255,255,0.08) 0);
      position: relative;
    }

    .gauge::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .gauge strong {
      position: relative;
      font-size: 36px;
      letter-spacing: -0.06em;
    }

    .component-list {
      display: grid;
      gap: 9px;
    }

    .component {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 8px;
    }

    .component strong {
      color: var(--text);
    }

    .wide-grid {
      grid-template-columns: 1fr 1fr;
      margin-bottom: 18px;
    }

    .buzz7 {
      display: flex;
      align-items: end;
      gap: 10px;
      height: 150px;
      padding-top: 10px;
    }

    .buzz-col {
      flex: 1;
      min-width: 18px;
      background: linear-gradient(180deg, var(--cyan), var(--blue));
      border-radius: 10px 10px 4px 4px;
      height: 4px;
      position: relative;
    }

    .buzz-col span {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
    }

    .coverage-list,
    .narrative-list,
    .risk-list,
    .source-list {
      display: grid;
      gap: 12px;
    }

    .item {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.035);
    }

    .item-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--soft);
      font-size: 11px;
      padding: 4px 8px;
      margin-right: 6px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.045);
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .error {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.26);
      color: #FFD6D6;
      border-radius: var(--radius);
      padding: 18px;
      margin-top: 20px;
      white-space: pre-wrap;
    }

    @media (max-width: 1024px) {
      .hero,
      .main-grid,
      .wide-grid {
        grid-template-columns: 1fr;
      }

      .kpis {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 24px, 1440px);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .kpis {
        grid-template-columns: 1fr;
      }

      .buzz-wrap {
        grid-template-columns: 1fr;
      }

      .platform-row {
        grid-template-columns: 1fr;
      }

      .platform-number {
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">L</div>
        <div>
          <h1>Lumos</h1>
          <p>Fandom Intelligence · mercado brasileiro</p>
        </div>
      </div>

      <div class="status">
        <span class="dot"></span>
        <span id="statusText">Carregando dados...</span>
      </div>
    </header>

    <section id="root"></section>

    <footer class="footer">
      Lumos · dados atualizados automaticamente via GitHub Actions.
    </footer>
  </main>

  <script>
    const TITLE_ID = "hp";

    function safeNumber(value, fallback = 0) {
      if (value === null || value === undefined) return fallback;
      const cleaned = String(value).replace("/100", "").replace("%", "").replace("+", "").trim();
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : fallback;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getTitle(feed) {
      return feed?.titles?.[TITLE_ID] || Object.values(feed?.titles || {})[0] || null;
    }

    function getCurrentSnapshot(feed) {
      const title = getTitle(feed);
      if (!title) return null;

      return (
        title.days?.d0 ||
        title.weeks?.w0 ||
        Object.values(title.weeks || {})[0] ||
        null
      );
    }

    function getRaw(snapshot) {
      return snapshot?._raw || {};
    }

    function getPlatformCounts(snapshot) {
      const raw = getRaw(snapshot);

      return raw.platform_counts || {
        "Imprensa": 0,
        "YouTube PT-BR": 0,
        "X": 0,
        "Google Trends BR": 0,
        "Wikipedia": 0
      };
    }

    function getPlatformShare(snapshot) {
      const raw = getRaw(snapshot);

      return raw.platform_share || snapshot?.platform_share || {
        "Imprensa": 0,
        "YouTube PT-BR": 0,
        "X": 0,
        "Google Trends BR": 0,
        "Wikipedia": 0
      };
    }

    function getBuzz(snapshot) {
      const raw = getRaw(snapshot);
      return safeNumber(raw.buzz ?? snapshot?.kpi?.buzz?.v, 0);
    }

    function getKpi(snapshot, key, fallback = "-") {
      return snapshot?.kpi?.[key] || { v: fallback, suf: "", sub: "" };
    }

    function getBuzz7(snapshot) {
      const values = Array.isArray(snapshot?.buzz7) ? snapshot.buzz7 : [];
      const clean = values.map(v => safeNumber(v, 0)).slice(-7);

      while (clean.length < 7) clean.unshift(0);

      return clean;
    }

    function renderKpi(label, kpi) {
      return `
        <article class="card">
          <div class="kpi-label">${escapeHtml(label)}</div>
          <div class="kpi-value">
            ${escapeHtml(kpi.v ?? "-")}<small>${escapeHtml(kpi.suf ?? "")}</small>
          </div>
          <div class="kpi-sub">${escapeHtml(kpi.sub ?? "")}</div>
        </article>
      `;
    }

    function renderPlatforms(snapshot) {
      const counts = getPlatformCounts(snapshot);
      const shares = getPlatformShare(snapshot);

      const order = ["Imprensa", "X", "YouTube PT-BR", "Google Trends BR", "Wikipedia"];

      const rows = order.map(name => {
        const count = safeNumber(counts[name], 0);
        const share = safeNumber(shares[name], 0);

        return `
          <div class="platform-row">
            <div class="platform-name">${escapeHtml(name)}</div>
            <div class="bar">
              <div class="bar-fill" style="width:${Math.max(0, Math.min(100, share))}%"></div>
            </div>
            <div class="platform-number">${count} · ${share}%</div>
          </div>
        `;
      }).join("");

      return `
        <section class="card">
          <h3>Radar de plataformas</h3>
          <div class="platform-list">
            ${rows}
          </div>
          <div class="kpi-sub" style="margin-top:14px;">
            Fonte: <strong>_raw.platform_counts</strong> e <strong>_raw.platform_share</strong>.
          </div>
        </section>
      `;
    }

    function renderBuzz(snapshot) {
      const raw = getRaw(snapshot);
      const buzz = getBuzz(snapshot);
      const components = raw.buzz_components || {};

      const deg = `${Math.max(0, Math.min(100, buzz))}%`;

      return `
        <section class="card">
          <h3>Buzz Score</h3>
          <div class="buzz-wrap">
            <div class="gauge" style="--buzzDeg:${deg}">
              <strong>${buzz}</strong>
            </div>

            <div class="component-list">
              <div class="component"><span>Volume</span><strong>${safeNumber(components.volume_component, 0)}</strong></div>
              <div class="component"><span>Diversidade</span><strong>${safeNumber(components.diversity_component, 0)}</strong></div>
              <div class="component"><span>Google Trends</span><strong>${safeNumber(components.trend_component, 0)}</strong></div>
              <div class="component"><span>Wikipedia</span><strong>${safeNumber(components.wiki_component, 0)}</strong></div>
              <div class="component"><span>Sentimento</span><strong>${safeNumber(components.sentiment_component, 0)}</strong></div>
            </div>
          </div>

          <div class="kpi-sub" style="margin-top:16px;">
            Trends: ${safeNumber(raw.trends_score, 0)}/100 · Wiki: ${safeNumber(raw.wiki_score, 0)}/100 · Base: ${safeNumber(raw.base_count, 0)} sinais.
          </div>
        </section>
      `;
    }

    function renderBuzz7(snapshot) {
      const values = getBuzz7(snapshot);
      const max = Math.max(1, ...values);

      const cols = values.map(v => {
        const h = Math.max(4, Math.round((v / max) * 130));
        return `<div class="buzz-col" style="height:${h}px"><span>${v}</span></div>`;
      }).join("");

      return `
        <section class="card">
          <h3>Buzz nos últimos 7 pontos</h3>
          <div class="buzz7">${cols}</div>
          <div class="kpi-sub">Fonte: <strong>snapshot.buzz7</strong> / histórico semanal.</div>
        </section>
      `;
    }

    function renderCoverage(snapshot) {
      const items = Array.isArray(snapshot?.coverage) ? snapshot.coverage : [];

      const html = items.length
        ? items.map(item => `
          ${escapeHtml(item.u || 
            <div class="item-title">${escapeHtml(item.title || "Fonte coletada")}</div>
            <div class="item-meta">
              <span class="tag">${escapeHtml(item.o || "Fonte")}</span>
              <span class="tag">${escapeHtml(item.scope || "Escopo")}</span>
              <span class="tag">${escapeHtml(item.time || "")}</span>
            </div>
          </a>
        `).join("")
        : `<div class="item"><div class="item-title">Sem coverage disponível para este snapshot.</div></div>`;

      return `
        <section class="card">
          <h3>Coverage e sinais coletados</h3>
          <div class="coverage-list">${html}</div>
        </section>
      `;
    }

    function renderNarratives(snapshot) {
      const items = Array.isArray(snapshot?.narratives) ? snapshot.narratives : [];

      const html = items.length
        ? items.map(item => `
          <div class="item">
            <div class="item-title">${escapeHtml(item.t || "Narrativa")}</div>
            <div class="item-meta">
              <span class="tag">${escapeHtml(item.pf || "Plataforma")}</span>
              <span class="tag">${escapeHtml(item.senti || "neu")}</span>
              ${escapeHtml(item.growth || "")}
            </div>
          </div>
        `).join("")
        : `<div class="item"><div class="item-title">Sem narrativas disponíveis.</div></div>`;

      return `
        <section class="card">
          <h3>Narrativas principais</h3>
          <div class="narrative-list">${html}</div>
        </section>
      `;
    }

    function renderRisks(snapshot) {
      const items = Array.isArray(snapshot?.risks) ? snapshot.risks : [];

      const html = items.length
        ? items.map(item => `
          <div class="item">
            <div class="item-title">${escapeHtml(item.t || "Risco")}</div>
            <div class="item-meta">
              <span class="tag">${escapeHtml(item.sev || "low")}</span>
              ${escapeHtml(item.d || "")}
              <br><br>
              <strong>Recomendação:</strong> ${escapeHtml(item.rec || "")}
            </div>
          </div>
        `).join("")
        : `<div class="item"><div class="item-title">Sem riscos disponíveis.</div></div>`;

      return `
        <section class="card">
          <h3>Riscos e recomendações</h3>
          <div class="risk-list">${html}</div>
        </section>
      `;
    }

    function renderSources(snapshot) {
      const sources = Array.isArray(snapshot?.metricSources)
        ? snapshot.metricSources
        : Array.isArray(snapshot?._raw?.sources)
          ? snapshot._raw.sources
          : [];

      const html = sources.length
        ? sources.map(item => `
          <div class="item">
            <div class="item-title">${escapeHtml(item.metric || "Métrica")}</div>
            <div class="item-meta">
              <strong>Fonte:</strong> ${escapeHtml(item.source || "")}
              <br>
              <strong>Método:</strong> ${escapeHtml(item.method || "")}
            </div>
          </div>
        `).join("")
        : `<div class="item"><div class="item-title">Sem fontes/metodologia disponíveis.</div></div>`;

      return `
        <section class="card">
          <h3>Fontes e metodologia</h3>
          <div class="source-list">${html}</div>
        </section>
      `;
    }

    function renderApp(feed) {
      const title = getTitle(feed);
      const snapshot = getCurrentSnapshot(feed);

      if (!title || !snapshot) {
        throw new Error("Não encontrei title/snapshot no data.json.");
      }

      const raw = getRaw(snapshot);
      const mentions = getKpi(snapshot, "mentions", "0");
      const sentiment = getKpi(snapshot, "sentiment", "-");
      const sov = getKpi(snapshot, "sov", "0");
      const buzz = getKpi(snapshot, "buzz", "0");

      const currentWindow = raw.current_window || "sem current_window";
      const trendKeyword = raw.trends_top_keyword || "sem keyword";
      const updated = snapshot.updated || feed.generated_at || "sem data";

      document.getElementById("statusText").textContent = `Atualizado: ${updated}`;

      document.getElementById("root").innerHTML = `
        <section class="hero">
          <div>
            <h2>${escapeHtml(title.topTitle || title.label || "Harry Potter — Série HBO Max")}</h2>
            <p>
              ${escapeHtml(title.topSub || "Daily Intelligence · mercado brasileiro")}
              <br>
              Snapshot ativo: <strong>${escapeHtml(snapshot.label || "current")}</strong>.
              Janela: <strong>${escapeHtml(currentWindow)}</strong>.
            </p>
          </div>

          <div class="hero-meta">
            <div class="pill">
              <span>Tracking</span>
              <strong>${escapeHtml(feed.tracking_label || "Desde o teaser")}</strong>
            </div>
            <div class="pill">
              <span>Top keyword Google Trends</span>
              <strong>${escapeHtml(trendKeyword)}</strong>
            </div>
            <div class="pill">
              <span>Fonte ativa</span>
              <strong>${escapeHtml(feed.source || "backend automático")}</strong>
            </div>
          </div>
        </section>

        <section class="grid kpis">
          ${renderKpi("Menções / sinais", mentions)}
          ${renderKpi("Sentimento", sentiment)}
          ${renderKpi("Share of Voice", sov)}
          ${renderKpi("Buzz Score", buzz)}
        </section>

        <section class="grid main-grid">
          ${renderPlatforms(snapshot)}
          ${renderBuzz(snapshot)}
        </section>

        <section class="grid wide-grid">
          ${renderBuzz7(snapshot)}
          ${renderNarratives(snapshot)}
        </section>

        <section class="grid wide-grid">
          ${renderCoverage(snapshot)}
          ${renderRisks(snapshot)}
        </section>

        ${renderSources(snapshot)}
      `;
    }

    async function loadData() {
      const url = `./data.json?v=${Date.now()}`;

      const response = await fetch(url, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Falha ao carregar data.json: ${response.status} ${response.statusText}`);
      }

      return response.json();
    }

    async function init() {
      try {
        const feed = await loadData();
        renderApp(feed);
      } catch (error) {
        console.error(error);
        document.getElementById("statusText").textContent = "Erro ao carregar";
        document.getElementById("root").innerHTML = `
          <div class="error">
            Erro ao carregar o Lumos.

            ${escapeHtml(error.message || error)}
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
